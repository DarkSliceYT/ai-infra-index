name: Publish to HuggingFace Datasets

on:
  push:
    branches:
      - main
    paths:
      - 'HUGGINGFACE_DATASET_CARD.md'
      - 'data/cloud-pricing.json'
      - 'data/gpu-specs.json'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm creation of HuggingFace dataset'
        required: true
        default: 'yes'

permissions:
  contents: read

jobs:
  publish-to-huggingface:
    name: Create and Populate HuggingFace Dataset
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Check HF_TOKEN availability
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is not configured. Please add it in repository Settings > Secrets and variables > Actions > New repository secret."
            echo "::error::Get your HuggingFace write token from: https://huggingface.co/settings/tokens"
            exit 1
          else
            echo "HF_TOKEN is configured (length: ${#HF_TOKEN})"
            echo "::notice::HF_TOKEN found, proceeding with dataset creation"
          fi
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Create HuggingFace dataset repo and upload files
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, sys
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN")
          api = HfApi(token=token)
          REPO_ID = "alpha-one-index/ai-infra-index"
          REPO_TYPE = "dataset"

          # Step 1: Create the repository
          print(f"Creating dataset repository: {REPO_ID}")
          try:
              repo_url = api.create_repo(
                  repo_id=REPO_ID,
                  repo_type=REPO_TYPE,
                  private=False,
                  exist_ok=True,
              )
              print(f"Repository created/verified: {repo_url}")
          except Exception as e:
              print(f"Error creating repo: {e}")
              sys.exit(1)

          # Step 2: Upload README.md (dataset card)
          readme_content = open("HUGGINGFACE_DATASET_CARD.md").read()
          print("Uploading README.md (dataset card)...")
          api.upload_file(
              path_or_fileobj=readme_content.encode(),
              path_in_repo="README.md",
              repo_id=REPO_ID,
              repo_type=REPO_TYPE,
              commit_message="Add dataset card",
          )
          print("README.md uploaded.")

          # Step 3: Upload data/cloud-pricing.json
          print("Uploading data/cloud-pricing.json...")
          api.upload_file(
              path_or_fileobj="data/cloud-pricing.json",
              path_in_repo="data/cloud-pricing.json",
              repo_id=REPO_ID,
              repo_type=REPO_TYPE,
              commit_message="Add cloud pricing data",
          )
          print("data/cloud-pricing.json uploaded.")

          # Step 4: Upload data/gpu-specs.json
          print("Uploading data/gpu-specs.json...")
          api.upload_file(
              path_or_fileobj="data/gpu-specs.json",
              path_in_repo="data/gpu-specs.json",
              repo_id=REPO_ID,
              repo_type=REPO_TYPE,
              commit_message="Add GPU specifications data",
          )
          print("data/gpu-specs.json uploaded.")

          print(f"\nSuccess! Dataset available at: https://huggingface.co/datasets/{REPO_ID}")
          PYEOF

      - name: Verify dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ["HF_TOKEN"])
          files = list(api.list_repo_files(repo_id="alpha-one-index/ai-infra-index", repo_type="dataset"))
          print("Files in dataset repository:")
          for f in files:
              print(f"  - {f}")
          print(f"Total files: {len(files)}")
          PYEOF
