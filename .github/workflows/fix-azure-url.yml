name: Fix Azure URL Encoding
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Patch fetch_pricing.py
        run: |
          cd scripts
          # Fix 1: Add import urllib.parse after import urllib.error
          sed -i '/^import urllib\.error$/a import urllib.parse' fetch_pricing.py
          # Fix 2: Write a small patcher script
          cat > /tmp/patch.py << 'HEREDOC'
          import sys
          lines = open(sys.argv[1]).readlines()
          out = []
          for line in lines:
              s = line.strip()
              if s == 'url = f"{AZURE_API}?{query}"':
                  ws = line[:len(line)-len(line.lstrip())]
                  out.append(ws + 'url = f"{AZURE_API}?" + urllib.parse.quote(query, safe="=&$\'()")\n')
              else:
                  out.append(line)
          open(sys.argv[1], 'w').writelines(out)
          print('Patched URL encoding line')
          HEREDOC
          python3 /tmp/patch.py fetch_pricing.py
          # Verify
          grep -n 'urllib.parse' fetch_pricing.py
      - name: Commit and push
        run: |
          git config user.name "alpha-one-index"
          git config user.email "alpha-one-index@users.noreply.github.com"
          git add scripts/fetch_pricing.py
          git diff --cached
          git commit -m "fix: URL-encode Azure API query to fix empty results" || echo "No changes"
          git push
