name: Update GPU Pricing Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pricing:
    name: Fetch and Update GPU Cloud Pricing
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pricing fetcher
        run: python scripts/fetch_pricing.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/cloud-pricing.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/cloud-pricing.json
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "chore: auto-update cloud pricing data [${TIMESTAMP}]"
          git push

      - name: No changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "No pricing changes detected"
