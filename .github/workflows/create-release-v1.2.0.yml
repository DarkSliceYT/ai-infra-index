name: Create Release v1.2.0

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/create-release-v1.2.0.yml'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create Release v1.2.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "" | base64 -d > /tmp/release-notes.md
          gh release create v1.2.0 \
            --repo "${GITHUB_REPOSITORY}" \
            --title "v1.2.0 — Cost Optimization & Decision Guides" \
            --notes-file /tmp/release-notes.md \
            --target main
